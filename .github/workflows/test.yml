name: Test formula

on:
  pull_request:
    paths:
      - "Formula/**"
  push:
    branches: [main]
    paths:
      - "Formula/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up tap
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/vicoco-ai"
          ln -s "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/vicoco-ai/homebrew-ruflo"

      - name: Install formula
        run: |
          # Pre-built native addon (ripgrep.node) in a transitive dependency has
          # insufficient Mach-O header padding for Homebrew's dylib ID rewrite.
          # The install completes and the binary works; only the linkage fixer
          # returns non-zero, so we allow that and verify the binary below.
          brew install vicoco-ai/ruflo/ruflo || true

      - name: Verify installation
        run: |
          test -x "$(brew --prefix)/bin/ruflo"
          ruflo --version

      - name: Test formula
        run: brew test vicoco-ai/ruflo/ruflo

      - name: Audit formula
        run: brew audit --strict --formula vicoco-ai/ruflo/ruflo
